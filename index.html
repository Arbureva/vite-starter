<!doctype html>
<html lang="zh-CN" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2da94a" />
    <title>Dashboard Starter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // 在首帧前应用主题，避免暗色模式闪白。
      // ⚠️ 这里的 key 需与 src/config.ts 的 themeStorageKey 保持一致。
      (function () {
        try {
          var t = localStorage.getItem('starter-theme');
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (t === 'dark' || (!t && sysDark)) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
